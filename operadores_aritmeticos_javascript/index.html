<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=Exemplos com">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo com Math</h1>

    <p>Digite um numero
        <input type="number" id="numero">
        <button onclick="calcular()">calcular</button>
    </p>

    <h2>Resultados</h2>
    <p id="abs"></p>
    <p id="ceil"></p>
    <p id="floor"></p>
    <p id="round"></p>
    <p id="sqrt"></p>
    <p id="pow"></p>
    <p id="random"></p>

    <script>
        function calcular(){
            let num = Number(document.getElementById("numero").value);

            document.getElementById("abs").textContent = "Valor absoluto:"+ Math.abs(num);
            
            document.getElementById("ceil").textContent = "Arredondado para cima:" + Math.ceil(num);

            document.getElementById("floor").textContent = "Arredondado para baixo:" + Math.floor(num);

            document.getElementById("round").textContent = "Arredondado:" + Math.round(num);

            document.getElementById("sqrt").textContent = "Raiz quadrada:" + Math.sqrt(num);

            document.getElementById("pow").textContent = "Elevado ao quadrado:" + Math.pow(num,2);

            document.getElementById("random").textContent = "Número aleatório:" + Math.random();
            
        }

    </script>
</body>
</html>
