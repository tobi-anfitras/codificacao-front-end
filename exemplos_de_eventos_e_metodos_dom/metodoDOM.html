<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>exemplos de metodos DOM</h1>
    <!--exemplo de getElementById-->

<button id="btnid">Click para obter o id</button>
<div class="output" id="outputId">usado para acessar um elemento pelo id</div>

<hr>
<!--exemplo de getElelemtByClassName-->
<button id="btnClass">clique para acessar a classe</button>
<div class="output" id="outputClass">retorna uma coleção de elementos com a mesma classe</div>
<div class="output">class 1</div>
<div class="output">class 2</div>

<hr>

<!--exemplos de querySelector-->
<button id="btnquery">Clique para alterar o conteudo com querySelector</button>
<div class="output" id="outputquery">retorna o primeiro elemento que corresponde ao seletor</div>

<hr>
<!--exemplo de createElement e appendChild-->
<button id="btnCreate">Clique para criar um novo elemento</button>
<div class="output" id="outCreate">cria um novo elemento no DOM</div>

<hr>
<!--exemplo de reoverChild-->
<button id="btnRemove">Clique para remover um elemento</button>
<div class="output" id="outpuRemove">remove um elemento do DOM</div>
<div id="tobeRemoved">esse é o elemento que sera removido</div>

</body>
</html>
